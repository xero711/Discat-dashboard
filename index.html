  <head>
    <meta charset="UTF-8" />
    <script>
      (() => {
        const localHosts = new Set(["127.0.0.1", "localhost", "::1"]);
        if (window.location.protocol === "http:" && !localHosts.has(window.location.hostname)) {
          window.location.replace(
            `https://${window.location.host}${window.location.pathname}${window.location.search}${window.location.hash}`,
          );
        }
        const queryParams = new URLSearchParams(window.location.search);
        const fragmentParams = new URLSearchParams(window.location.hash.replace(/^#/, ""));
        const productParam = queryParams.get("product");
        let storedProduct = null;
        let storedSession = false;
        try {
          storedProduct = window.localStorage.getItem("discat_dashboard_product");
          storedSession = Boolean(window.localStorage.getItem("discat_one_session_token"));
        } catch {
          storedProduct = null;
          storedSession = false;
        }
        const initialProduct = ["one", "guard"].includes(productParam) ? productParam : storedProduct;
        if (["one", "guard"].includes(initialProduct)) {
          document.documentElement.dataset.dashboardProduct = initialProduct;
        }
        let cookieSession = false;
        try {
          cookieSession = document.cookie
            .split(";")
            .some((part) => part.trim().startsWith("discat_one_session_token="));
        } catch {
          cookieSession = false;
        }
        const callbackSession = Boolean(
          queryParams.get("session_token") || fragmentParams.get("session_token"),
        );
        document.documentElement.dataset.dashboardAuth =
          storedSession || cookieSession || callbackSession ? "pending" : "guest";
      })();
    </script>
